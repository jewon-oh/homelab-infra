# нҒҙлҹ¬мҠӨн„° н•„мҲҳ м•ҢлҰј к·ңм№ҷ
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-alerts
  namespace: observability
  labels:
    release: observability
spec:
  groups:
    # --- л…ёл“ң мҲҳмӨҖ м•ҢлҰј ---
    - name: node.rules
      rules:
        - alert: NodeMemoryHigh
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node л©”лӘЁлҰ¬ мӮ¬мҡ©лҘ  лҶ’мқҢ ({{ $labels.instance }})"
            description: "Node {{ $labels.instance }} л©”лӘЁлҰ¬ мӮ¬мҡ©лҘ : {{ $value | printf \"%.1f\" }}% (85% мҙҲкіј)"

        - alert: NodeMemoryCritical
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node л©”лӘЁлҰ¬ мң„кё° ({{ $labels.instance }})"
            description: "Node {{ $labels.instance }} л©”лӘЁлҰ¬ мӮ¬мҡ©лҘ : {{ $value | printf \"%.1f\" }}% (95% мҙҲкіј)"

        # мӢӨм ң лҚ°мқҙн„°/мқҙлҜём§Җ нҢҢнӢ°м…ҳ м „мІҙ м»ӨлІ„ (worker-3мқҖ /var/lib/rancher/k3s к°Җ лі„лҸ„ нҢҢнӢ°м…ҳ)
        - alert: NodeDiskSpaceHigh
          expr: |
            (1 - (node_filesystem_avail_bytes{fstype=~"ext.|xfs|btrfs"}
                / node_filesystem_size_bytes{fstype=~"ext.|xfs|btrfs"})) * 100 > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node л””мҠӨнҒ¬ кіөк°„ л¶ҖмЎұ ({{ $labels.instance }} {{ $labels.mountpoint }})"
            description: "Node {{ $labels.instance }} нҢҢнӢ°м…ҳ {{ $labels.mountpoint }} мӮ¬мҡ©лҘ : {{ $value | printf \"%.1f\" }}%"

        - alert: NodeDiskSpaceCritical
          expr: |
            (1 - (node_filesystem_avail_bytes{fstype=~"ext.|xfs|btrfs"}
                / node_filesystem_size_bytes{fstype=~"ext.|xfs|btrfs"})) * 100 > 90
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node л””мҠӨнҒ¬ мң„кё° ({{ $labels.instance }} {{ $labels.mountpoint }})"
            description: "Node {{ $labels.instance }} {{ $labels.mountpoint }} {{ $value | printf \"%.1f\" }}% вҖ” мҰүмӢң нҡҢмҲҳ н•„мҡ”"

        # kubelet мқҙлҜём§Җ GC мӢӨнҢЁлҠ” л””мҠӨнҒ¬ м••л°• м§Ғм „ мҰқмғҒ вҖ” мЎ°кё° м•ҢлҰј
        - alert: KubeletImageGCFailing
          expr: increase(kubelet_image_garbage_collection_errors_total[10m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "kubelet image GC мӢӨнҢЁ ({{ $labels.instance }})"
            description: "{{ $labels.instance }} мқҳ kubeletмқҙ мқҙлҜём§Җ GCлҘј мҲҳн–үн•ҳм§Җ лӘ»н•Ё. л””мҠӨнҒ¬ м••л°• к°ҖлҠҘм„ұ."

        - alert: NodeDown
          expr: up{job="node-exporter"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Node мқ‘лӢө м—ҶмқҢ ({{ $labels.instance }})"
            description: "Node {{ $labels.instance }}мқҙ(к°Җ) 1л¶„ мқҙмғҒ мқ‘лӢөн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ."

    # --- Pod / Workload м•ҢлҰј ---
    - name: pod.rules
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Pod CrashLoop л°ҳліө ({{ $labels.namespace }}/{{ $labels.pod }})"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} м»Ён…Ңмқҙл„Ҳ {{ $labels.container }}мқҙ(к°Җ) 15л¶„ лӮҙ {{ $value }}нҡҢ мһ¬мӢңмһ‘лҗҳм—ҲмҠөлӢҲлӢӨ."

        - alert: PodNotReady
          # Job owner м ңмҷё: м •мғҒ мў…лЈҢлҗң Job podлҠ” Ready=FalseлЎң лӮЁм§Җл§Ң м •мғҒ.
          # for 5m вҶ’ 10m: лЎӨм•„мӣғ мӨ‘ мқјмӢңм Ғ 0/1 Ready мғҒнғңлҠ” м•Ңлҹҝм—җм„ң м ңмҷё.
          expr: |
            kube_pod_status_ready{condition="false"} == 1
            unless on (namespace, pod)
            kube_pod_owner{owner_kind="Job"}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod Ready мғҒнғң м•„лӢҳ ({{ $labels.namespace }}/{{ $labels.pod }})"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }}мқҙ(к°Җ) 10л¶„ мқҙмғҒ Not Ready мғҒнғңмһ…лӢҲлӢӨ."

        - alert: DeploymentReplicasMismatch
          expr: kube_deployment_spec_replicas != kube_deployment_status_available_replicas
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment л Ҳн”ҢлҰ¬м№ҙ л¶Ҳмқјм№ҳ ({{ $labels.namespace }}/{{ $labels.deployment }})"
            description: "{{ $labels.namespace }}/{{ $labels.deployment }} лӘ©н‘ң {{ $value }}мҷҖ мӢӨм ң л Ҳн”ҢлҰ¬м№ҙ мҲҳк°Җ лӢӨлҰ…лӢҲлӢӨ."

    # --- PVC / мҠӨнҶ лҰ¬м§Җ м•ҢлҰј ---
    - name: storage.rules
      rules:
        - alert: PVCSpaceHigh
          expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100 > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PVC мҡ©лҹү л¶ҖмЎұ мһ„л°• ({{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }})"
            description: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} мӮ¬мҡ©лҘ : {{ $value | printf \"%.1f\" }}%"

        - alert: PVCSpaceCritical
          expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100 > 95
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "PVC мҡ©лҹү мҙҲкіј мң„кё° ({{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }})"
            description: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} мӮ¬мҡ©лҘ : {{ $value | printf \"%.1f\" }}% вҖ” мҰүмӢң нҷ•мһҘ н•„мҡ”"

    # --- Longhorn м•ҢлҰј ---
    - name: longhorn.rules
      rules:
        - alert: LonghornVolumeDegraded
          expr: longhorn_volume_robustness == 2
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn ліјлҘЁ Degraded ({{ $labels.volume }})"
            description: "Longhorn ліјлҘЁ {{ $labels.volume }}мқҙ(к°Җ) Degraded мғҒнғңмһ…лӢҲлӢӨ. л Ҳн”ҢлҰ¬м№ҙ мҲҳлҘј нҷ•мқён•ҳм„ёмҡ”."

        - alert: LonghornVolumeFaulted
          expr: longhorn_volume_robustness == 3
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn ліјлҘЁ Faulted ({{ $labels.volume }})"
            description: "Longhorn ліјлҘЁ {{ $labels.volume }}мқҙ(к°Җ) Faulted мғҒнғңмһ…лӢҲлӢӨ. мҰүмӢң мЎ°м№ҳ н•„мҡ”!"

        # 85% вҶ’ 75% лЎң мһ„кі„к°’ лӮ®м¶Ө (мЎ°кё° кІҪліҙ, eviction storm мӮ¬кі  мһ¬л°ң л°©м§Җ)
        - alert: LonghornNodeStorageFull
          expr: (longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes) * 100 > 75
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn л…ёл“ң мҠӨнҶ лҰ¬м§Җ л¶ҖмЎұ ({{ $labels.node }})"
            description: "Longhorn л…ёл“ң {{ $labels.node }} мҠӨнҶ лҰ¬м§Җ мӮ¬мҡ©лҘ : {{ $value | printf \"%.1f\" }}%"

        - alert: LonghornNodeStorageCritical
          expr: (longhorn_node_storage_usage_bytes / longhorn_node_storage_capacity_bytes) * 100 > 90
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Longhorn л…ёл“ң мҠӨнҶ лҰ¬м§Җ мң„кё° ({{ $labels.node }})"
            description: "Longhorn л…ёл“ң {{ $labels.node }} {{ $value | printf \"%.1f\" }}% вҖ” kubelet eviction мһ„л°•. мҰүмӢң replica л¶„мӮ° н•„мҡ”."

    # --- Prometheus мһҗмІҙ м•ҢлҰј ---
    - name: prometheus.rules
      rules:
        - alert: TargetDown
          expr: up == 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Prometheus scrape лҢҖмғҒ мқ‘лӢө м—ҶмқҢ ({{ $labels.job }}/{{ $labels.instance }})"
            description: "Job {{ $labels.job }}, instance {{ $labels.instance }}мқҙ(к°Җ) 2л¶„ мқҙмғҒ scrape мӢӨнҢЁ"

    # --- Cilium BGP м•ҢлҰј ---
    # OPNSenseмҷҖмқҳ BGP м„ём…ҳмқҙ лҒҠкё°л©ҙ LANмқҳ *.local.fresh96jwjw.org VIP м ‘к·ј л¶Ҳк°Җ.
    # л©”нҠёлҰӯ к°’: 1 = Established, к·ё мҷё = л¬ём ң. label `node`лЎң м–ҙлҠҗ л…ёл“ңмқҳ м„ём…ҳмқём§Җ мӢқлі„.
    - name: cilium-bgp.rules
      rules:
        - alert: CiliumBGPSessionDown
          expr: cilium_bgp_control_plane_session_state != 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Cilium BGP м„ём…ҳ лҒҠк№Җ ({{ $labels.node }} вҶ’ {{ $labels.neighbor }})"
            description: "Node {{ $labels.node }}мқҳ BGP peer {{ $labels.neighbor }} м„ём…ҳмқҙ Establishedк°Җ м•„лӢҢ мғҒнғңлЎң 2л¶„ мҙҲкіј. LAN лӮҙл¶Җ лҸ„л©”мқё м ‘к·ј мҳҒн–Ҙ к°ҖлҠҘ."

        - alert: CiliumBGPNoAdvertisedRoutes
          expr: cilium_bgp_control_plane_advertised_routes < 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Cilium BGP кҙ‘кі  кІҪлЎң м—ҶмқҢ ({{ $labels.node }})"
            description: "Node {{ $labels.node }}к°Җ BGP peerлЎң кҙ‘кі  мӨ‘мқё кІҪлЎңк°Җ 0к°ң (5л¶„ мқҙмғҒ). LoadBalancer VIP кҙ‘кі  лҲ„лқҪ мғҒнғң."
