apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-exporter
  namespace: observability
  labels:
    app: pve-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pve-exporter
  template:
    metadata:
      labels:
        app: pve-exporter
    spec:
      containers:
        - name: exporter
          image: prompve/prometheus-pve-exporter:3.5.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9221
              name: metrics
          envFrom:
            - secretRef:
                name: pve-exporter-credentials
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pve-exporter
  namespace: observability
  labels:
    app: pve-exporter
spec:
  selector:
    app: pve-exporter
  ports:
    - name: metrics
      port: 9221
      targetPort: metrics
