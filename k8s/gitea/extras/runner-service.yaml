# Gitea Runner Headless Service
# StatefulSet 의 serviceName 으로 참조됨 — 각 Pod 에 안정적 DNS(gitea-runner-N.gitea-runner) 부여
apiVersion: v1
kind: Service
metadata:
  name: gitea-runner
  namespace: gitea
  labels:
    app: gitea-runner
spec:
  clusterIP: None
  selector:
    app: gitea-runner
  ports:
    - name: noop
      port: 1
      targetPort: 1
