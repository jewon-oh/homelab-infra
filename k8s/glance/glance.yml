                url: https://vaultwarden.fresh96jwjw.org
                icon: di:vaultwarden

          - type: monitor
            title: Proxmox
            sites:
              - title: Proxmox
                url: https://proxmox-wtr-pro.local.fresh96jwjw.org
                icon: di:proxmox
              - title: Proxmox Backup
                url: https://proxmox-backup.local.fresh96jwjw.org
