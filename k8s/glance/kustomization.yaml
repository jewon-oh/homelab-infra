apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - httproute.yaml

configMapGenerator:
  - name: glance-config
    namespace: glance
    files:
      - glance.yml

generatorOptions:
  disableNameSuffixHash: true
