# securityContext.runAsNonRoot 강제 (#52)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-nonroot
  annotations:
    policies.kyverno.io/title: Require runAsNonRoot
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-run-as-nonroot
      match:
        any:
          - resources:
              kinds:
                - Pod
              operations: [CREATE, UPDATE]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - longhorn-system   # storage 컨테이너 일부 root 요구
      validate:
        message: "securityContext.runAsNonRoot: true 필요"
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: true
          - spec:
              containers:
                - securityContext:
                    runAsNonRoot: true
