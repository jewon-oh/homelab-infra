# 핵심 ns 의 NetworkPolicy 부재 감지 (#52)
#
# audit 만 — 실제로 매니페스트 생성 시점에 차단하긴 어려움 (NP 는 별 리소스).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-networkpolicy-in-critical-ns
  annotations:
    policies.kyverno.io/title: Require NetworkPolicy
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-np-exists
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - argocd
                - database
                - observability
                - cert-manager
              operations: [CREATE]
      context:
        - name: nps
          apiCall:
            urlPath: "/apis/networking.k8s.io/v1/namespaces/{{ request.namespace }}/networkpolicies"
            jmesPath: "items | length(@)"
      validate:
        message: "ns {{ request.namespace }} 에 NetworkPolicy 부재 — east-west 격리 권장"
        deny:
          conditions:
            all:
              - key: "{{ nps }}"
                operator: Equals
                value: 0
