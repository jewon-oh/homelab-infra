apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: truenas
  namespace: default
spec:
  endpoints:
    - ip:
        address: 192.168.1.11
        port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: truenas
  namespace: default
spec:
  parentRefs:
    - name: internal-gateway
  hostnames:
    - "truenas.local.fresh96jwjw.org"
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: truenas
