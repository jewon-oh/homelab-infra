apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: pbs
  namespace: default
spec:
  endpoints:
    - ip:
        address: 192.168.1.18
        port: 8007
  tls:
    insecureSkipVerify: true
    sni: 192.168.1.18
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pbs
  namespace: default
spec:
  parentRefs:
    - name: internal-gateway
  hostnames:
    - "proxmox-backup.local.fresh96jwjw.org"
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: pbs
