# 홈랩 인프라 인벤토리
# K3s HA 클러스터: 3 server (embedded etcd) + worker
# kube-vip VIP: 192.168.4.10 (SVC VLAN40)
# Cilium LoadBalancer IP 풀: 192.168.4.80-90
all:
  children:
    # ── K3s HA 클러스터 (SVC VLAN40) ──
    k3s_server:
      hosts:
        k3s-server-1:
          ansible_host: 192.168.4.11
          ansible_user: jw
          k3s_role: "init"          # 첫 번째 서버: 클러스터 초기화
        k3s-server-2:
          ansible_host: 192.168.4.12
          ansible_user: jw
          k3s_role: "join"
        k3s-server-3:
          ansible_host: 192.168.4.13
          ansible_user: jw
          k3s_role: "join"

    k3s_workers:
      hosts:
        k3s-worker-1:
          ansible_host: 192.168.4.21
          ansible_user: jw
          k3s_gpu: true
          k3s_ops: true
        k3s-worker-2:
          ansible_host: 192.168.4.24
          ansible_user: jw
          k3s_db: true
        k3s-worker-5:
          ansible_host: 192.168.4.25
          ansible_user: jw
          k3s_gpu: true

    # Radxa N100 베어메탈 워커 (SVC VLAN40)
    k3s_workers_baremetal:
      hosts:
        k3s-worker-3:
          ansible_host: 192.168.4.23
          ansible_user: jw
          k3s_ops: true

    # 전체 K3s 노드 그룹
    k3s:
      children:
        k3s_server:
        k3s_workers:
        k3s_workers_baremetal:

  vars:
    # ── K3s HA 설정 ──
    k3s_version: "v1.31.4+k3s1"      # 안정 릴리스 고정
    k3s_vip: "192.168.4.10"           # kube-vip VIP (API server)
    k3s_vip_interface: "eth0"         # VIP 바인딩 인터페이스
    k3s_cluster_cidr: "10.42.0.0/16"
    k3s_service_cidr: "10.43.0.0/16"
    # ── Cilium LoadBalancer IP 풀 ──
    lb_pool_start: "192.168.4.80"
    lb_pool_end: "192.168.4.90"

    # ── etcd S3 백업 (SeaweedFS) ──
    # 실제 값은 ansible-vault 또는 -e 로 주입 (시크릿은 git에 올리지 않음)
    etcd_s3_endpoint: "seaweedfs.example:8333"
    etcd_s3_bucket: "k8s-backups"
    etcd_s3_folder: "k3s-etcd"
    etcd_s3_access_key: "<S3_ACCESS_KEY>"
    etcd_s3_secret_key: "<S3_SECRET_KEY>"
